name: Load Test
on: [push]

jobs:
  k6_test:
    name: Run k6 Load Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1 # Nova ação oficial para instalar o k6

      - name: Run k6 test
        uses: grafana/run-k6-action@v1 # Nova ação oficial para rodar o teste
        with:
          path: tests/load/k6-script.js
          flags: --env BASE_URL=https://matheusbacetic.github.io/projeto-engenhariaSoftware/
